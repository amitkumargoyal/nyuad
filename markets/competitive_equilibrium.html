<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Competitive Equilibrium — Consumer &amp; Producer Surplus</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FAF7F2; color: #1a1a1a; min-height: 100vh; padding: 24px; }
h1 { font-size: 18px; font-weight: 500; color: #5A1BA6; margin-bottom: 20px; }
.layout { display: grid; grid-template-columns: 210px 1fr; gap: 18px; align-items: start; max-width: 960px; }
.sidebar { display: flex; flex-direction: column; gap: 10px; }
.card { background: #fff; border: 1px solid #e5e0d8; border-radius: 12px; padding: 13px 15px; }
.card-title { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #f0ebe3; }
.ctrl { margin-bottom: 9px; }
.ctrl:last-of-type { margin-bottom: 0; }
.ctrl-label { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 3px; }
.ctrl-val { font-weight: 500; color: #1a1a1a; min-width: 28px; text-align: right; }
input[type=range] { width: 100%; accent-color: #5A1BA6; cursor: pointer; }
.formula { font-size: 11px; color: #888; margin-top: 7px; font-style: italic; }
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.metric { background: #f5f1eb; border-radius: 8px; padding: 8px 10px; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 2px; }
.metric-val { font-size: 14px; font-weight: 500; }
.metric-ts { background: #f5f1eb; border-radius: 8px; padding: 8px 10px; margin-top: 8px; }
.reset-btn { width: 100%; margin-top: 10px; padding: 7px; font-size: 12px; border-radius: 8px; border: 1px solid #d0c8bc; background: transparent; cursor: pointer; color: #555; font-family: inherit; }
.reset-btn:hover { background: #f5f1eb; }
.chart-card { background: #fff; border: 1px solid #e5e0d8; border-radius: 12px; padding: 16px; }
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; font-size: 12px; color: #666; }
.leg { display: flex; align-items: center; gap: 5px; }
.leg-sq { width: 12px; height: 12px; border-radius: 2px; }
.leg-ln { width: 22px; height: 2.5px; }
</style>
</head>
<body>
<h1>Competitive equilibrium — consumer &amp; producer surplus</h1>
<div class="layout">
  <div class="sidebar">

    <div class="card">
      <div class="card-title">Demand — P = a &minus; bQ</div>
      <div class="ctrl">
        <div class="ctrl-label"><span>a</span><span class="ctrl-val" id="va">80</span></div>
        <input type="range" min="50" max="100" step="1" value="80" id="sa" oninput="update()">
      </div>
      <div class="ctrl">
        <div class="ctrl-label"><span>b</span><span class="ctrl-val" id="vb">0.6</span></div>
        <input type="range" min="0.1" max="2" step="0.1" value="0.6" id="sb" oninput="update()">
      </div>
      <div class="formula" id="d-formula">P = 80 &minus; 0.6Q</div>
    </div>

    <div class="card">
      <div class="card-title">Supply — P = c + dQ</div>
      <div class="ctrl">
        <div class="ctrl-label"><span>c</span><span class="ctrl-val" id="vc">10</span></div>
        <input type="range" min="0" max="50" step="1" value="10" id="sc" oninput="update()">
      </div>
      <div class="ctrl">
        <div class="ctrl-label"><span>d</span><span class="ctrl-val" id="vd">1.0</span></div>
        <input type="range" min="0.9" max="5" step="0.1" value="1.0" id="sd" oninput="update()">
      </div>
      <div class="formula" id="s-formula">P = 10 + 1.0Q</div>
    </div>

    <div class="card">
      <div class="card-title">Equilibrium &amp; surplus</div>
      <div class="metrics">
        <div class="metric"><div class="metric-label">P*</div><div class="metric-val" style="color:#5A1BA6" id="eq-p">&#8212;</div></div>
        <div class="metric"><div class="metric-label">Q*</div><div class="metric-val" style="color:#5A1BA6" id="eq-q">&#8212;</div></div>
        <div class="metric"><div class="metric-label">CS</div><div class="metric-val" style="color:#5A1BA6" id="cs">&#8212;</div></div>
        <div class="metric"><div class="metric-label">PS</div><div class="metric-val" style="color:#A03A2C" id="ps">&#8212;</div></div>
      </div>
      <div class="metric-ts">
        <div class="metric-label">Total surplus</div>
        <div class="metric-val" style="color:#4a6b3a;font-size:16px;" id="ts">&#8212;</div>
      </div>
      <button class="reset-btn" onclick="resetAll()">&#8635; Reset</button>
    </div>

  </div>

  <div class="chart-card">
    <div class="legend">
      <div class="leg"><div class="leg-ln" style="background:#5A1BA6;"></div><span>Demand</span></div>
      <div class="leg"><div class="leg-ln" style="background:#A03A2C;"></div><span>Supply</span></div>
      <div class="leg"><div class="leg-sq" style="background:rgba(90,27,166,0.15);border:1px solid rgba(90,27,166,0.4);"></div><span>Consumer surplus</span></div>
      <div class="leg"><div class="leg-sq" style="background:rgba(160,58,44,0.15);border:1px solid rgba(160,58,44,0.4);"></div><span>Producer surplus</span></div>
    </div>
    <svg id="diagram" width="100%" style="display:block;" aria-label="Supply and demand diagram with fixed axes and surplus shading"></svg>
  </div>
</div>

<script>
const PAD = { top: 16, right: 20, bottom: 44, left: 50 };
const QMAX = 100, PMAX = 100;
let W = 600, H = 460;

function dims() {
  const svg = document.getElementById('diagram');
  const cw = svg.parentElement.clientWidth - 32;
  W = Math.max(320, cw);
  H = Math.round(W * 0.75);
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
  svg.setAttribute('height', H);
}

function sx(q) { return PAD.left + (q / QMAX) * (W - PAD.left - PAD.right); }
function sy(p) { return PAD.top + ((PMAX - p) / PMAX) * (H - PAD.top - PAD.bottom); }
function fmt(n) { return n.toFixed(2); }

function update() {
  dims();
  const a = +document.getElementById('sa').value;
  const b = +document.getElementById('sb').value;
  const c = +document.getElementById('sc').value;
  const d = +document.getElementById('sd').value;

  document.getElementById('va').textContent = a;
  document.getElementById('vb').textContent = b.toFixed(1);
  document.getElementById('vc').textContent = c;
  document.getElementById('vd').textContent = d.toFixed(1);
  document.getElementById('d-formula').innerHTML = 'P = ' + a + ' &minus; ' + b.toFixed(1) + 'Q';
  document.getElementById('s-formula').innerHTML = 'P = ' + c + ' + ' + d.toFixed(1) + 'Q';

  const qEq = (a - c) / (b + d);
  const pEq = a - b * qEq;
  const inView = qEq >= 0 && qEq <= QMAX && pEq >= 0 && pEq <= PMAX;

  if (inView) {
    const cs = 0.5 * (a - pEq) * qEq;
    const ps = 0.5 * (pEq - c) * qEq;
    document.getElementById('eq-p').textContent = fmt(pEq);
    document.getElementById('eq-q').textContent = fmt(qEq);
    document.getElementById('cs').textContent = fmt(cs);
    document.getElementById('ps').textContent = fmt(ps);
    document.getElementById('ts').textContent = fmt(cs + ps);
  } else {
    ['eq-p','eq-q','cs','ps','ts'].forEach(function(id) {
      document.getElementById(id).textContent = '\u2014';
    });
  }

  const svg = document.getElementById('diagram');
  const yb = H - PAD.bottom;
  const gc = 'rgba(0,0,0,0.07)';
  const tc = '#888';
  let html = '';

  [20,40,60,80,100].forEach(function(v) {
    const y = sy(v);
    html += '<line x1="' + PAD.left + '" y1="' + y + '" x2="' + (W-PAD.right) + '" y2="' + y + '" stroke="' + gc + '" stroke-width="1"/>';
    html += '<text x="' + (PAD.left-6) + '" y="' + (y+4) + '" text-anchor="end" font-size="11" fill="' + tc + '">' + v + '</text>';
    const x = sx(v);
    html += '<line x1="' + x + '" y1="' + PAD.top + '" x2="' + x + '" y2="' + yb + '" stroke="' + gc + '" stroke-width="1"/>';
    html += '<text x="' + x + '" y="' + (yb+16) + '" text-anchor="middle" font-size="11" fill="' + tc + '">' + v + '</text>';
  });
  html += '<text x="' + (PAD.left-6) + '" y="' + (sy(0)+4) + '" text-anchor="end" font-size="11" fill="' + tc + '">0</text>';
  html += '<text x="' + sx(0) + '" y="' + (yb+16) + '" text-anchor="middle" font-size="11" fill="' + tc + '">0</text>';

  const ac = 'rgba(0,0,0,0.25)';
  html += '<line x1="' + PAD.left + '" y1="' + PAD.top + '" x2="' + PAD.left + '" y2="' + yb + '" stroke="' + ac + '" stroke-width="1"/>';
  html += '<line x1="' + PAD.left + '" y1="' + yb + '" x2="' + (W-PAD.right) + '" y2="' + yb + '" stroke="' + ac + '" stroke-width="1"/>';

  const midY = PAD.top + (H - PAD.top - PAD.bottom) / 2;
  const midX = PAD.left + (W - PAD.left - PAD.right) / 2;
  html += '<text x="' + (PAD.left-32) + '" y="' + midY + '" text-anchor="middle" font-size="12" fill="' + tc + '" transform="rotate(-90,' + (PAD.left-32) + ',' + midY + ')">Price (P)</text>';
  html += '<text x="' + midX + '" y="' + (H-4) + '" text-anchor="middle" font-size="12" fill="' + tc + '">Quantity (Q)</text>';

  if (inView && qEq > 0) {
    const x0 = sx(0), yA = sy(a), xE = sx(qEq), yE = sy(pEq), yPstar = sy(pEq), yC = sy(c);
    html += '<polygon points="' + x0 + ',' + yA + ' ' + xE + ',' + yE + ' ' + x0 + ',' + yPstar + '" fill="rgba(90,27,166,0.13)" stroke="rgba(90,27,166,0.35)" stroke-width="0.5"/>';
    html += '<polygon points="' + x0 + ',' + yC + ' ' + xE + ',' + yE + ' ' + x0 + ',' + yPstar + '" fill="rgba(160,58,44,0.13)" stroke="rgba(160,58,44,0.35)" stroke-width="0.5"/>';
    html += '<line x1="' + x0 + '" y1="' + yE + '" x2="' + xE + '" y2="' + yE + '" stroke="rgba(0,0,0,0.3)" stroke-width="1" stroke-dasharray="4,3"/>';
    html += '<line x1="' + xE + '" y1="' + yE + '" x2="' + xE + '" y2="' + yb + '" stroke="rgba(0,0,0,0.3)" stroke-width="1" stroke-dasharray="4,3"/>';
  }

  const dQ1 = Math.min(QMAX, a / b);
  const dP1 = Math.max(0, a - b * dQ1);
  html += '<line x1="' + sx(0) + '" y1="' + sy(Math.min(a,PMAX)) + '" x2="' + sx(dQ1) + '" y2="' + sy(dP1) + '" stroke="#5A1BA6" stroke-width="2.5"/>';
  html += '<text x="' + (sx(0)-8) + '" y="' + (sy(Math.min(a,PMAX))+4) + '" text-anchor="end" font-size="12" fill="#5A1BA6" font-weight="500">D</text>';

  const sQ1 = Math.min(QMAX, (PMAX - c) / d);
  const sP1 = Math.min(PMAX, c + d * sQ1);
  html += '<line x1="' + sx(0) + '" y1="' + sy(c) + '" x2="' + sx(sQ1) + '" y2="' + sy(sP1) + '" stroke="#A03A2C" stroke-width="2.5"/>';
  html += '<text x="' + (sx(sQ1)+5) + '" y="' + (sy(sP1)-4) + '" font-size="12" fill="#A03A2C" font-weight="500">S</text>';

  if (inView) {
    const xE = sx(qEq), yE = sy(pEq);
    html += '<circle cx="' + xE + '" cy="' + yE + '" r="5.5" fill="#5A1BA6" stroke="#fff" stroke-width="1.5"/>';
    const labelRight = xE < W - PAD.right - 90;
    html += '<text x="' + (xE+(labelRight?9:-9)) + '" y="' + (yE-9) + '" text-anchor="' + (labelRight?'start':'end') + '" font-size="11" fill="#5A1BA6" font-weight="500">E (' + fmt(qEq) + ', ' + fmt(pEq) + ')</text>';
    if (qEq > 0) {
      html += '<text x="' + sx(qEq*0.22) + '" y="' + sy(pEq+(a-pEq)*0.5) + '" text-anchor="middle" font-size="12" fill="#5A1BA6" font-weight="500">CS</text>';
      html += '<text x="' + sx(qEq*0.22) + '" y="' + sy(c+(pEq-c)*0.5) + '" text-anchor="middle" font-size="12" fill="#A03A2C" font-weight="500">PS</text>';
    }
  }

  svg.innerHTML = html;
}

function resetAll() {
  document.getElementById('sa').value = 80;
  document.getElementById('sb').value = 0.6;
  document.getElementById('sc').value = 10;
  document.getElementById('sd').value = 1.0;
  update();
}

update();
window.addEventListener('resize', update);
</script>

<div style="margin-top: 32px; padding-top: 16px; border-top: 1px solid #e5e0d8;">
  <a href="https://amitkumargoyal.github.io/nyuad/markets/" style="font-size: 13px; color: #5A1BA6; text-decoration: none;">← Back to Markets</a>
</div>
</body>
</html>
